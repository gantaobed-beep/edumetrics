<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - EduMetrics</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0fdf4;
            color: #1f2937;
        }

        /* Sidebar Styling (Matches Dashboard) */
        aside { background: linear-gradient(180deg, #ffffff 0%, #f9fafb 100%); }
        .nav-item { transition: all 0.2s ease-in-out; position: relative; overflow: hidden; }
        .nav-item::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background-color: transparent; transition: background-color 0.2s; }
        .nav-item.active { background-color: #eef2ff; color: #4f46e5; }
        .nav-item.active::before { background-color: #4f46e5; }
        .nav-item:not(.active):hover { background-color: #f3f4f6; color: #111827; }

        /* Form Styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 700;
            color: #4b5563;
            margin-bottom: 0.5rem;
        }

        .custom-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            font-weight: 600;
            color: #1f2937;
            transition: all 0.2s ease;
            outline: none;
        }

        .custom-input:focus {
            background-color: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 border-r border-gray-200 flex flex-col shadow-sm z-10 relative">
        <div class="p-6 border-b border-gray-100 flex items-center justify-center">
             <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-blue-500 rounded-lg flex items-center justify-center mr-3 shadow-md text-white font-bold text-xl">E</div>
            <h1 class="text-2xl font-black tracking-tight text-gray-800">Edu<span class="text-green-500">Metrics</span></h1>
        </div>
        
        <nav class="flex-1 mt-6 space-y-2 px-4">
            <a href="index.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-gray-500">
                <i class="fas fa-chart-pie w-5 text-center"></i> Dashboard
            </a>
            <a href="teacher.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl font-bold">
                <i class="fas fa-upload w-5 text-center text-indigo-500"></i> Upload Data
            </a>
            <a href="premium.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-gray-500 group">
                <i class="fas fa-crown w-5 text-center text-amber-400 group-hover:text-amber-500 transition-colors"></i> Career AI
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8 flex items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
        
        <div class="glass-panel p-10 w-full max-w-3xl border-t-8 border-t-indigo-500">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 mb-4">
                    <i class="fas fa-cloud-upload-alt text-2xl text-indigo-600"></i>
                </div>
                <h2 class="text-3xl font-black text-gray-800 tracking-tight">Enter Assessment Data</h2>
                <p class="text-gray-500 mt-2">Input the student's latest metrics to update their cognitive profile.</p>
            </div>
            
            <form id="uploadForm" class="space-y-6">
                <!-- Section 1: Basic Info -->
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-100">
                    <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4"><i class="fas fa-info-circle mr-2"></i>General Assessment</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="input-group">
                            <label>Subject Topic</label>
                            <input type="text" id="topic" class="custom-input" placeholder="e.g. Calculus II" required>
                        </div>
                        <div class="input-group">
                            <label>Final Score (%)</label>
                            <input type="number" id="score" class="custom-input" placeholder="0-100" required min="0" max="100">
                        </div>
                        <div class="input-group">
                            <label>Duration (Mins)</label>
                            <input type="number" id="time" class="custom-input" placeholder="e.g. 45" required min="1">
                        </div>
                    </div>
                </div>

                <!-- Section 2: Cognitive Breakdown -->
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-100">
                     <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4"><i class="fas fa-brain mr-2"></i>Cognitive Analysis</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="input-group">
                            <label>Concept Errors</label>
                            <input type="number" id="concept" class="custom-input" placeholder="Count" required min="0">
                            <p class="text-xs text-gray-400 mt-1">Fundamental misunderstandings</p>
                        </div>
                        <div class="input-group">
                            <label>Careless Mistakes</label>
                            <input type="number" id="careless" class="custom-input" placeholder="Count" required min="0">
                            <p class="text-xs text-gray-400 mt-1">Silly arithmetic slips</p>
                        </div>
                        <div class="input-group">
                            <label>Logical Deduction (%)</label>
                            <input type="number" id="logical" class="custom-input" placeholder="0-100" required min="0" max="100">
                            <p class="text-xs text-gray-400 mt-1">Steps vs. Guessing</p>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="submit-btn w-full text-white font-bold text-lg py-4 rounded-xl flex justify-center items-center gap-2">
                        <span>Save to Local Database</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Visual feedback on button
            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Processing...</span>';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            // Simulate slight delay for "processing" feel
            setTimeout(() => {
                const newTest = {
                    topic: document.getElementById('topic').value,
                    score: Number(document.getElementById('score').value),
                    time: Number(document.getElementById('time').value),
                    concept: Number(document.getElementById('concept').value),
                    careless: Number(document.getElementById('careless').value),
                    logical: Number(document.getElementById('logical').value),
                    date: new Date().toISOString()
                };

                let history = JSON.parse(localStorage.getItem('eduMetricsHistory')) || [];
                history.push(newTest);
                localStorage.setItem('eduMetricsHistory', JSON.stringify(history));
                
                // Redirect
                window.location.href = "index.html"; 
            }, 600);
        });
    </script>
</body>
</html>
